openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TripGeniee API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: trips
    description: Trip planning operations
  - name: destinations
    description: Destination discovery
  - name: budget
    description: Budget planning

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List saved trips
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: saveTrip
      tags: [trips]
      summary: Save a generated trip plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripInput"
      responses:
        "201":
          description: Trip saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get a saved trip by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Not found
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete a saved trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /trips/generate:
    post:
      operationId: generateTrip
      tags: [trips]
      summary: Generate an AI trip plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripRequest"
      responses:
        "200":
          description: Generated trip plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripPlan"

  /destinations:
    get:
      operationId: listDestinations
      tags: [destinations]
      summary: Get popular destinations
      responses:
        "200":
          description: List of popular destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Destination"

  /budget/calculate:
    post:
      operationId: calculateBudget
      tags: [budget]
      summary: Calculate trip budget breakdown
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetRequest"
      responses:
        "200":
          description: Budget breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetBreakdown"

  /trips/stats:
    get:
      operationId: getTripStats
      tags: [trips]
      summary: Get trip statistics for dashboard
      responses:
        "200":
          description: Trip stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Trip:
      type: object
      required: [id, destination, days, budget, travelStyle, createdAt, plan]
      properties:
        id:
          type: integer
        destination:
          type: string
        days:
          type: integer
        budget:
          type: number
        currency:
          type: ["string", "null"]
        travelStyle:
          type: string
        interests:
          type: ["string", "null"]
        groupSize:
          type: integer
        createdAt:
          type: string
        plan:
          $ref: "#/components/schemas/TripPlan"

    TripInput:
      type: object
      required: [destination, days, budget, travelStyle, plan]
      properties:
        destination:
          type: string
        days:
          type: integer
        budget:
          type: number
        currency:
          type: string
        travelStyle:
          type: string
        interests:
          type: string
        groupSize:
          type: integer
        plan:
          $ref: "#/components/schemas/TripPlan"

    TripRequest:
      type: object
      required: [destination, days, budget, travelStyle]
      properties:
        destination:
          type: string
        days:
          type: integer
        budget:
          type: number
        currency:
          type: string
        travelStyle:
          type: string
          enum: [budget, comfort, luxury, adventure, cultural, family]
        interests:
          type: string
        groupSize:
          type: integer

    TripPlan:
      type: object
      required: [summary, itinerary, hotels, transport, packingList, tips, budgetBreakdown]
      properties:
        summary:
          type: string
        bestTimeToVisit:
          type: string
        weather:
          type: string
        itinerary:
          type: array
          items:
            $ref: "#/components/schemas/DayPlan"
        hotels:
          type: array
          items:
            $ref: "#/components/schemas/HotelSuggestion"
        transport:
          type: array
          items:
            $ref: "#/components/schemas/TransportOption"
        packingList:
          type: array
          items:
            $ref: "#/components/schemas/PackingCategory"
        tips:
          type: array
          items:
            type: string
        budgetBreakdown:
          $ref: "#/components/schemas/BudgetBreakdown"
        attractions:
          type: array
          items:
            $ref: "#/components/schemas/Attraction"

    DayPlan:
      type: object
      required: [day, title, activities]
      properties:
        day:
          type: integer
        title:
          type: string
        activities:
          type: array
          items:
            $ref: "#/components/schemas/Activity"

    Activity:
      type: object
      required: [time, name, description]
      properties:
        time:
          type: string
        name:
          type: string
        description:
          type: string
        estimatedCost:
          type: ["number", "null"]
        category:
          type: string

    HotelSuggestion:
      type: object
      required: [name, stars, pricePerNight, description]
      properties:
        name:
          type: string
        stars:
          type: integer
        pricePerNight:
          type: number
        description:
          type: string
        amenities:
          type: array
          items:
            type: string
        location:
          type: string

    TransportOption:
      type: object
      required: [type, description, estimatedCost]
      properties:
        type:
          type: string
        description:
          type: string
        estimatedCost:
          type: number
        duration:
          type: ["string", "null"]

    PackingCategory:
      type: object
      required: [category, items]
      properties:
        category:
          type: string
        items:
          type: array
          items:
            type: string

    Attraction:
      type: object
      required: [name, description, type]
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
        entryFee:
          type: ["number", "null"]
        mustSee:
          type: boolean

    BudgetRequest:
      type: object
      required: [destination, days, groupSize, travelStyle]
      properties:
        destination:
          type: string
        days:
          type: integer
        groupSize:
          type: integer
        travelStyle:
          type: string

    BudgetBreakdown:
      type: object
      required: [total, transport, accommodation, food, activities, miscellaneous]
      properties:
        total:
          type: number
        transport:
          type: number
        accommodation:
          type: number
        food:
          type: number
        activities:
          type: number
        miscellaneous:
          type: number
        currency:
          type: string
        savingTips:
          type: array
          items:
            type: string

    Destination:
      type: object
      required: [id, name, country, imageUrl, description, avgBudgetPerDay, bestSeason]
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: string
        imageUrl:
          type: string
        description:
          type: string
        avgBudgetPerDay:
          type: number
        bestSeason:
          type: string
        tags:
          type: array
          items:
            type: string
        rating:
          type: number

    TripStats:
      type: object
      required: [totalTrips, totalDestinations, avgBudget, popularDestination]
      properties:
        totalTrips:
          type: integer
        totalDestinations:
          type: integer
        avgBudget:
          type: number
        popularDestination:
          type: string
        totalDaysPlanned:
          type: integer
